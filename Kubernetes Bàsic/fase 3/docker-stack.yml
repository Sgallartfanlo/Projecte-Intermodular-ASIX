version: "3.9"

services:

  db-products:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
    volumes:
      - db_products_data:/var/lib/mysql
      - ./db-products/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - data-net
    secrets:
      - db_root_password
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  db-orders:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
    volumes:
      - db_orders_data:/var/lib/mysql
      - ./db-orders/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - data-net
    secrets:
      - db_root_password
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  cache:
    image: redis:7
    networks:
      - data-net
    deploy:
      replicas: 1

  message-queue:
    image: rabbitmq:3-management
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - data-net
    deploy:
      replicas: 1

  product-service:
    image: product-service
    environment:
      DB_HOST: db-products
      DB_USER: root
      DB_NAME: productsdb
      REDIS_HOST: cache
      REDIS_TTL: 60
    secrets:
      - db_root_password
    networks:
      - backend-net
      - data-net
    deploy:
      replicas: 2

  order-service:
    image: order-service
    environment:
      DBP_HOST: db-products
      DBO_HOST: db-orders
      DB_USER: root
      DBP_NAME: productsdb
      DBO_NAME: ordersdb
      RABBIT_HOST: message-queue
      QUEUE_NAME: orders
    secrets:
      - db_root_password
    networks:
      - backend-net
      - data-net
    deploy:
      replicas: 2

  user-service:
    image: user-service
    environment:
      DBO_HOST: db-orders
      DB_USER: root
      DBO_NAME: ordersdb
    secrets:
      - db_root_password
    networks:
      - backend-net
      - data-net
    deploy:
      replicas: 2

  notification-service:
    image: notification-service
    environment:
      RABBIT_HOST: message-queue
      QUEUE_NAME: orders
    networks:
      - backend-net
      - data-net
    deploy:
      replicas: 1

  api-gateway:
    image: api-gateway
    networks:
      - frontend-net
      - backend-net
    ports:
      - "8081:80"
    deploy:
      replicas: 2

  frontend:
    image: frontend
    ports:
      - "80:80"
    networks:
      - frontend-net
    deploy:
      replicas: 2

networks:
  frontend-net:
  backend-net:
  data-net:

volumes:
  db_products_data:
  db_orders_data:
  rabbitmq_data:

secrets:
  db_root_password:
    external: true
