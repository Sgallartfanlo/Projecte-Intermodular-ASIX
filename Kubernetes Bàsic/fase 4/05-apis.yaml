# ============================================================
# PRODUCT SERVICE
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-api-code
  namespace: shopmicro
data:
  app.py: |
    from flask import Flask, jsonify, request
    import mysql.connector, redis, json, os

    app = Flask(__name__)

    def get_db():
        return mysql.connector.connect(
            host=os.environ.get('MYSQL_HOST', 'db-products'),
            user='root',
            password=os.environ.get('MYSQL_ROOT_PASSWORD', 'root'),
            database='shop_products'
        )

    def get_redis():
        return redis.Redis(host=os.environ.get('REDIS_HOST', 'cache'), port=6379, decode_responses=True)

    def init_db():
        try:
            db = get_db(); c = db.cursor()
            c.execute("""CREATE TABLE IF NOT EXISTS products (
                id INT AUTO_INCREMENT PRIMARY KEY,
                name VARCHAR(255) NOT NULL,
                description TEXT,
                price DECIMAL(10,2) NOT NULL,
                stock INT DEFAULT 0,
                image_url VARCHAR(500)
            )""")
            c.execute("SELECT COUNT(*) FROM products")
            if c.fetchone()[0] == 0:
                sample = [
                    ('MacBook Pro M3', 'Portatil Apple amb chip M3 Pro, 18GB RAM, 512GB SSD', 2499.99, 15, ''),
                    ('iPhone 15 Pro', 'Smartphone Apple 256GB, titani natural, càmera 48MP', 1199.99, 30, ''),
                    ('AirPods Pro 2a gen', 'Auriculars amb cancel·lació activa de soroll i àudio espacial', 279.99, 50, ''),
                    ('iPad Air M2', 'Tablet Apple 11 pulgades, Wi-Fi, 256GB', 749.99, 20, ''),
                    ('Apple Watch Series 9', 'Rellotge intel·ligent GPS 45mm, alumini negre', 449.99, 25, ''),
                    ('Samsung Neo QLED 55"', 'Televisió 4K 55 pulgades, HDR2000, 144Hz', 899.99, 10, ''),
                    ('Sony WH-1000XM5', 'Auriculars over-ear premium, 30h bateria', 349.99, 35, ''),
                    ('Logitech MX Master 3S', 'Ratolí ergonomic sense fils, 8K DPI', 99.99, 60, ''),
                ]
                c.executemany(
                    "INSERT INTO products (name, description, price, stock, image_url) VALUES (%s,%s,%s,%s,%s)",
                    sample)
            db.commit(); c.close(); db.close()
        except Exception as e:
            print(f"DB init error: {e}")

    @app.route('/health')
    def health():
        return jsonify({'status': 'ok', 'service': 'product-service'})

    @app.route('/api/products', methods=['GET'])
    def get_products():
        try:
            r = get_redis()
            cached = r.get('products:all')
            if cached:
                return jsonify({'data': json.loads(cached), 'source': 'cache'})
        except: pass
        try:
            db = get_db(); c = db.cursor(dictionary=True)
            c.execute("SELECT * FROM products"); products = c.fetchall()
            for p in products: p['price'] = float(p['price'])
            c.close(); db.close()
            try: get_redis().setex('products:all', 60, json.dumps(products))
            except: pass
            return jsonify({'data': products, 'source': 'db'})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/products/<int:pid>', methods=['GET'])
    def get_product(pid):
        try:
            db = get_db(); c = db.cursor(dictionary=True)
            c.execute("SELECT * FROM products WHERE id=%s", (pid,))
            p = c.fetchone(); c.close(); db.close()
            if not p: return jsonify({'error': 'Not found'}), 404
            p['price'] = float(p['price'])
            return jsonify(p)
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/products', methods=['POST'])
    def create_product():
        data = request.get_json()
        try:
            db = get_db(); c = db.cursor()
            c.execute(
                "INSERT INTO products (name, description, price, stock, image_url) VALUES (%s,%s,%s,%s,%s)",
                (data['name'], data.get('description',''), data['price'], data.get('stock',0), data.get('image_url','')))
            db.commit(); new_id = c.lastrowid; c.close(); db.close()
            try: get_redis().delete('products:all')
            except: pass
            return jsonify({'id': new_id, 'message': 'Producte creat'}), 201
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/products/<int:pid>', methods=['PUT'])
    def update_product(pid):
        data = request.get_json()
        try:
            db = get_db(); c = db.cursor()
            c.execute(
                "UPDATE products SET name=%s, description=%s, price=%s, stock=%s WHERE id=%s",
                (data['name'], data.get('description',''), data['price'], data.get('stock',0), pid))
            db.commit(); c.close(); db.close()
            try: get_redis().delete('products:all')
            except: pass
            return jsonify({'message': 'Producte actualitzat'})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/products/<int:pid>', methods=['DELETE'])
    def delete_product(pid):
        try:
            db = get_db(); c = db.cursor()
            c.execute("DELETE FROM products WHERE id=%s", (pid,))
            db.commit(); c.close(); db.close()
            try: get_redis().delete('products:all')
            except: pass
            return jsonify({'message': 'Producte eliminat'})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    if __name__ == '__main__':
        init_db()
        app.run(host='0.0.0.0', port=5000)

  start.sh: |
    #!/bin/bash
    pip install flask mysql-connector-python redis --quiet
    python /app/app.py
