# ============================================================
# USER SERVICE - registre persistent a MySQL
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-api-code
  namespace: shopmicro
data:
  app.py: |
    from flask import Flask, jsonify, request
    import mysql.connector, hashlib, json, base64, os

    app = Flask(__name__)

    def get_db():
        return mysql.connector.connect(
            host=os.environ.get('MYSQL_HOST_USERS', 'db-orders'),
            user='root',
            password=os.environ.get('MYSQL_ROOT_PASSWORD', 'root'),
            database='shop_orders'
        )

    def init_db():
        try:
            db = get_db(); c = db.cursor()
            c.execute("""CREATE TABLE IF NOT EXISTS users (
                id INT AUTO_INCREMENT PRIMARY KEY,
                username VARCHAR(100) UNIQUE NOT NULL,
                name VARCHAR(255) NOT NULL,
                password_hash VARCHAR(64) NOT NULL,
                role VARCHAR(20) DEFAULT 'user',
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            )""")
            defaults = [
                ('admin', 'Administrador', 'admin123', 'admin'),
                ('oleguer', 'Oleguer', 'user123', 'user'),
                ('sergi', 'Sergi', 'user123', 'user'),
                ('alex', 'Alex', 'user123', 'user'),
            ]
            for u in defaults:
                h = hashlib.sha256(u[2].encode()).hexdigest()
                c.execute("INSERT IGNORE INTO users (username,name,password_hash,role) VALUES (%s,%s,%s,%s)",
                    (u[0],u[1],h,u[3]))
            db.commit(); c.close(); db.close()
        except Exception as e:
            print(f"DB init error: {e}")

    def make_token(username, role, name):
        payload = json.dumps({'username': username, 'role': role, 'name': name})
        return base64.b64encode(payload.encode()).decode()

    @app.route('/health')
    def health():
        return jsonify({'status': 'ok', 'service': 'user-service'})

    @app.route('/api/auth/login', methods=['POST'])
    def login():
        data = request.get_json()
        username = data.get('username','').strip().lower()
        hashed = hashlib.sha256(data.get('password','').encode()).hexdigest()
        try:
            db = get_db(); c = db.cursor(dictionary=True)
            c.execute("SELECT * FROM users WHERE username=%s AND password_hash=%s", (username, hashed))
            user = c.fetchone(); c.close(); db.close()
            if not user:
                return jsonify({'error': 'Credencials incorrectes'}), 401
            return jsonify({'token': make_token(user['username'],user['role'],user['name']),
                'username': user['username'], 'role': user['role'], 'name': user['name']})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/auth/register', methods=['POST'])
    def register():
        data = request.get_json()
        username = data.get('username','').strip().lower()
        name = data.get('name','').strip()
        password = data.get('password','')
        if not username or not password or not name:
            return jsonify({'error': 'Tots els camps son obligatoris'}), 400
        if len(password) < 4:
            return jsonify({'error': 'Contrasenya minima de 4 caracters'}), 400
        hashed = hashlib.sha256(password.encode()).hexdigest()
        try:
            db = get_db(); c = db.cursor()
            c.execute("INSERT INTO users (username,name,password_hash,role) VALUES (%s,%s,%s,'user')",
                (username, name, hashed))
            db.commit(); c.close(); db.close()
            return jsonify({'token': make_token(username,'user',name),
                'username': username, 'role': 'user', 'name': name}), 201
        except mysql.connector.IntegrityError:
            return jsonify({'error': "L'usuari ja existeix"}), 409
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/auth/verify', methods=['POST'])
    def verify():
        data = request.get_json()
        try:
            payload = json.loads(base64.b64decode(data.get('token','')).decode())
            return jsonify({'valid': True, 'user': payload})
        except:
            return jsonify({'valid': False}), 401

    @app.route('/api/users', methods=['GET'])
    def list_users():
        try:
            db = get_db(); c = db.cursor(dictionary=True)
            c.execute("SELECT id, username, name, role, created_at FROM users ORDER BY created_at DESC")
            users = c.fetchall()
            for u in users: u['created_at'] = str(u['created_at'])
            c.close(); db.close()
            return jsonify({'data': users})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    if __name__ == '__main__':
        init_db()
        app.run(host='0.0.0.0', port=5000)

