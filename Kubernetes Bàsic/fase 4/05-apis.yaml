# ============================================================
# ORDER SERVICE
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-api-code
  namespace: shopmicro
data:
  app.py: |
    from flask import Flask, jsonify, request
    import mysql.connector, pika, json, os, datetime

    app = Flask(__name__)

    def get_db():
        return mysql.connector.connect(
            host=os.environ.get('MYSQL_HOST', 'db-orders'),
            user='root',
            password=os.environ.get('MYSQL_ROOT_PASSWORD', 'root'),
            database='shop_orders'
        )

    def get_products_db():
        return mysql.connector.connect(
            host=os.environ.get('MYSQL_HOST_PRODUCTS', 'db-products'),
            user='root',
            password=os.environ.get('MYSQL_ROOT_PASSWORD', 'root'),
            database='shop_products'
        )

    def init_db():
        try:
            db = get_db(); c = db.cursor()
            c.execute("""CREATE TABLE IF NOT EXISTS orders (
                id INT AUTO_INCREMENT PRIMARY KEY,
                user_name VARCHAR(255) NOT NULL,
                product_id INT NOT NULL,
                product_name VARCHAR(255),
                quantity INT DEFAULT 1,
                total_price DECIMAL(10,2),
                status VARCHAR(50) DEFAULT 'confirmed',
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
            )""")
            db.commit(); c.close(); db.close()
        except Exception as e:
            print(f"DB init error: {e}")

    def publish_rabbitmq(message):
        try:
            conn = pika.BlockingConnection(pika.ConnectionParameters(
                host=os.environ.get('RABBITMQ_HOST', 'message-queue'), heartbeat=10))
            ch = conn.channel()
            ch.queue_declare(queue='orders', durable=True)
            ch.basic_publish(exchange='', routing_key='orders', body=json.dumps(message),
                properties=pika.BasicProperties(delivery_mode=2))
            conn.close()
        except Exception as e:
            print(f"RabbitMQ error: {e}")

    @app.route('/health')
    def health():
        return jsonify({'status': 'ok', 'service': 'order-service'})

    @app.route('/api/orders', methods=['GET'])
    def get_orders():
        user_filter = request.args.get('user')
        try:
            db = get_db(); c = db.cursor(dictionary=True)
            if user_filter:
                c.execute("SELECT * FROM orders WHERE user_name=%s ORDER BY created_at DESC", (user_filter,))
            else:
                c.execute("SELECT * FROM orders ORDER BY created_at DESC")
            orders = c.fetchall()
            for o in orders:
                o['total_price'] = float(o['total_price']) if o['total_price'] else 0
                o['created_at'] = str(o['created_at'])
            c.close(); db.close()
            return jsonify({'data': orders})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/orders', methods=['POST'])
    def create_order():
        data = request.get_json()
        try:
            pdb = get_products_db(); pc = pdb.cursor(dictionary=True)
            pc.execute("SELECT * FROM products WHERE id=%s", (data['product_id'],))
            product = pc.fetchone(); pc.close(); pdb.close()
            if not product:
                return jsonify({'error': 'Producte no trobat'}), 404
            qty = int(data.get('quantity', 1))
            if product['stock'] < qty:
                return jsonify({'error': f"Stock insuficient (disponible: {product['stock']})"}), 400
            total = float(product['price']) * qty
            # Descomptar stock amb verificació atòmica
            pdb2 = get_products_db(); pc2 = pdb2.cursor()
            pc2.execute(
                "UPDATE products SET stock = stock - %s WHERE id=%s AND stock >= %s",
                (qty, data['product_id'], qty))
            affected = pc2.rowcount
            pdb2.commit(); pc2.close(); pdb2.close()
            if affected == 0:
                return jsonify({'error': 'Stock insuficient'}), 400
            # Crear comanda
            db = get_db(); c = db.cursor()
            c.execute(
                "INSERT INTO orders (user_name, product_id, product_name, quantity, total_price, status) VALUES (%s,%s,%s,%s,%s,'confirmed')",
                (data.get('user_name','anonymous'), data['product_id'], product['name'], qty, total))
            db.commit(); order_id = c.lastrowid; c.close(); db.close()
            publish_rabbitmq({'event':'order_created','order_id':order_id,
                'user':data.get('user_name'),'product':product['name'],'quantity':qty,'total':total})
            return jsonify({'order_id': order_id, 'message': 'Comanda creada', 'total': total}), 201
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/orders/<int:oid>/cancel', methods=['POST'])
    def cancel_order(oid):
        data = request.get_json() or {}
        user_name = data.get('user_name','')
        role = data.get('role','user')
        try:
            db = get_db(); c = db.cursor(dictionary=True)
            c.execute("SELECT * FROM orders WHERE id=%s", (oid,))
            order = c.fetchone()
            if not order:
                c.close(); db.close()
                return jsonify({'error': 'Comanda no trobada'}), 404
            if role != 'admin' and order['user_name'] != user_name:
                c.close(); db.close()
                return jsonify({'error': 'No autoritzat'}), 403
            if order['status'] == 'cancelled':
                c.close(); db.close()
                return jsonify({'error': 'Ja cancel·lada'}), 400
            # Restaurar stock
            pdb = get_products_db(); pc = pdb.cursor()
            pc.execute("UPDATE products SET stock = stock + %s WHERE id=%s",
                (order['quantity'], order['product_id']))
            pdb.commit(); pc.close(); pdb.close()
            # Actualitzar ordre
            c2 = db.cursor()
            c2.execute("UPDATE orders SET status='cancelled' WHERE id=%s", (oid,))
            db.commit(); c.close(); c2.close(); db.close()
            publish_rabbitmq({'event':'order_cancelled','order_id':oid,
                'user':user_name,'product':order['product_name']})
            return jsonify({'message': f"Comanda #{oid} cancel·lada. Stock restaurat."})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/orders/<int:oid>', methods=['PUT'])
    def update_order(oid):
        data = request.get_json()
        try:
            db = get_db(); c = db.cursor()
            c.execute("UPDATE orders SET status=%s WHERE id=%s", (data.get('status','confirmed'), oid))
            db.commit(); c.close(); db.close()
            return jsonify({'message': 'Comanda actualitzada'})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    if __name__ == '__main__':
        init_db()
        app.run(host='0.0.0.0', port=5000)

