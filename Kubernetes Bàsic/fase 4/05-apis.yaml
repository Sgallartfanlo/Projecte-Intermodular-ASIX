---
# ============================================================
# NOTIFICATION SERVICE
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-code
  namespace: shopmicro
data:
  app.py: |
    import pika, json, os, time, datetime

    RABBITMQ_HOST = os.environ.get('RABBITMQ_HOST', 'message-queue')

    def callback(ch, method, properties, body):
        msg = json.loads(body)
        ts = datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')
        event = msg.get('event','unknown')
        if event == 'order_created':
            print(f"[{ts}] NOVA COMANDA #{msg.get('order_id')} | "
                  f"Client: {msg.get('user')} | Producte: {msg.get('product')} "
                  f"x{msg.get('quantity')} | Total: {msg.get('total')}EUR")
        elif event == 'order_cancelled':
            print(f"[{ts}] COMANDA #{msg.get('order_id')} CANCEL·LADA | "
                  f"Client: {msg.get('user')} | Producte: {msg.get('product')}")
        else:
            print(f"[{ts}] EVENT: {json.dumps(msg)}")
        ch.basic_ack(delivery_tag=method.delivery_tag)

    def main():
        while True:
            try:
                conn = pika.BlockingConnection(pika.ConnectionParameters(host=RABBITMQ_HOST))
                ch = conn.channel()
                ch.queue_declare(queue='orders', durable=True)
                ch.basic_qos(prefetch_count=1)
                ch.basic_consume(queue='orders', on_message_callback=callback)
                print(f"[*] Notification service escoltant a {RABBITMQ_HOST}...")
                ch.start_consuming()
            except Exception as e:
                print(f"Error: {e}. Reintentant en 5s...")
                time.sleep(5)

    if __name__ == '__main__':
        main()

  start.sh: |
    #!/bin/bash
    pip install pika --quiet
    python /app/app.py
