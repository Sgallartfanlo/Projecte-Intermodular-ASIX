apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: shopmicro
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="ca">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>ShopMicro</title>
      <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
          --bg:#0f0f13;--surface:#1a1a24;--surface2:#22222f;--surface3:#2a2a3a;
          --border:#2e2e42;--accent:#7c6af7;--accent2:#56d1b0;--warn:#f7a956;
          --danger:#f76a6a;--text:#e8e8f0;--muted:#7a7a9a;
        }
        body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

        /* ── AUTH SCREEN ── */
        #auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;
          background:radial-gradient(ellipse at 60% 30%,#1e1040 0%,#0f0f13 65%)}
        .auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;
          padding:40px;width:400px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
        .auth-logo{text-align:center;margin-bottom:28px}
        .auth-logo h1{font-size:26px;background:linear-gradient(135deg,var(--accent),var(--accent2));
          -webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .auth-logo p{color:var(--muted);font-size:13px;margin-top:4px}
        .auth-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--surface2);
          border-radius:8px;padding:3px}
        .auth-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);
          cursor:pointer;border-radius:6px;font-size:13px;font-weight:600;transition:.2s}
        .auth-tab.active{background:var(--accent);color:#fff}
        .auth-form{display:none}.auth-form.active{display:block}
        .fg{margin-bottom:14px}
        .fg label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;
          text-transform:uppercase;letter-spacing:.5px}
        .fg input{width:100%;background:var(--surface2);border:1px solid var(--border);
          color:var(--text);padding:11px 13px;border-radius:8px;font-size:14px;transition:.2s}
        .fg input:focus{outline:none;border-color:var(--accent)}
        .btn{padding:11px 22px;border-radius:8px;border:none;cursor:pointer;
          font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;
          align-items:center;gap:6px}
        .btn-primary{background:var(--accent);color:#fff}
        .btn-primary:hover{background:#6a59e0;transform:translateY(-1px)}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-warn{background:var(--warn);color:#fff}
        .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
        .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
        .btn-sm{padding:7px 13px;font-size:12px;border-radius:6px}
        .btn-block{width:100%;justify-content:center;margin-top:4px}
        .err-msg{color:var(--danger);font-size:12px;margin-top:8px;display:none}
        .hint-box{margin-top:16px;padding:12px;background:var(--surface2);border-radius:8px;
          font-size:12px;color:var(--muted);line-height:1.7}
        .hint-box strong{color:var(--text)}

        /* ── APP SHELL ── */
        #app{display:none}
        header{background:var(--surface);border-bottom:1px solid var(--border);
          padding:0 28px;height:58px;display:flex;align-items:center;
          justify-content:space-between;position:sticky;top:0;z-index:100;
          box-shadow:0 2px 12px rgba(0,0,0,.3)}
        .h-logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));
          -webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .h-nav{display:flex;gap:2px}
        .nav-btn{padding:8px 15px;border-radius:8px;border:none;cursor:pointer;
          background:transparent;color:var(--muted);font-size:13px;font-weight:500;transition:.15s}
        .nav-btn:hover,.nav-btn.active{background:var(--surface2);color:var(--text)}
        .nav-btn.active{color:var(--accent)}
        .h-user{display:flex;align-items:center;gap:10px;font-size:13px}
        .badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
        .badge-admin{background:rgba(124,106,247,.2);color:var(--accent)}
        .badge-user{background:rgba(86,209,176,.2);color:var(--accent2)}
        .cart-btn{position:relative}
        .cart-count{position:absolute;top:-4px;right:-4px;background:var(--danger);
          color:#fff;font-size:10px;font-weight:700;width:16px;height:16px;
          border-radius:50%;display:flex;align-items:center;justify-content:center}

        /* ── MAIN ── */
        main{padding:28px;max-width:1280px;margin:0 auto}
        .page{display:none}.page.active{display:block}
        .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
        .page-header h2{font-size:20px}
        .page-header p{color:var(--muted);font-size:13px;margin-top:3px}

        /* ── PRODUCTS GRID ── */
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
        .product-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
          overflow:hidden;transition:.2s}
        .product-card:hover{transform:translateY(-3px);border-color:var(--accent)}
        .p-img{height:120px;background:var(--surface2);display:flex;align-items:center;
          justify-content:center;font-size:48px}
        .p-body{padding:14px}
        .p-name{font-weight:700;font-size:14px;margin-bottom:4px}
        .p-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.4;
          display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .p-footer{display:flex;align-items:center;justify-content:space-between}
        .p-price{font-size:17px;font-weight:800;color:var(--accent2)}
        .p-stock{font-size:11px;color:var(--muted);margin-top:2px}
        .stock-low{color:var(--warn)}.stock-out{color:var(--danger)}

        /* ── CART MODAL ── */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);
          z-index:200;display:none;align-items:center;justify-content:center}
        .modal-overlay.open{display:flex}
        .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
          padding:28px;width:480px;max-width:95vw;max-height:80vh;overflow-y:auto}
        .modal h3{font-size:16px;margin-bottom:18px}
        .cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;
          border-bottom:1px solid var(--border)}
        .ci-icon{font-size:28px;width:40px;text-align:center}
        .ci-info{flex:1}
        .ci-name{font-size:13px;font-weight:600}
        .ci-price{font-size:12px;color:var(--muted)}
        .ci-qty{display:flex;align-items:center;gap:8px}
        .qty-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);
          background:var(--surface2);color:var(--text);cursor:pointer;font-size:14px;
          display:flex;align-items:center;justify-content:center}
        .qty-btn:hover{border-color:var(--accent)}
        .cart-total{display:flex;justify-content:space-between;padding:16px 0 0;
          font-weight:700;font-size:15px}
        .empty-state{text-align:center;color:var(--muted);padding:32px;font-size:13px}

        /* ── ORDERS TABLE ── */
        .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
        table{width:100%;border-collapse:collapse}
        th{text-align:left;padding:11px 15px;font-size:11px;color:var(--muted);
          text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
        td{padding:13px 15px;font-size:13px;border-bottom:1px solid var(--border)}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:var(--surface2)}
        .s-badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
        .s-confirmed{background:rgba(86,209,176,.15);color:var(--accent2)}
        .s-pending{background:rgba(247,169,86,.15);color:var(--warn)}
        .s-cancelled{background:rgba(247,106,106,.15);color:var(--danger)}

        /* ── ADMIN ── */
        .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
          padding:16px;text-align:center}
        .stat-num{font-size:26px;font-weight:800;color:var(--accent)}
        .stat-label{font-size:11px;color:var(--muted);margin-top:3px}
        .admin-tabs{display:flex;gap:4px;margin-bottom:20px}
        .at-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);
          background:transparent;color:var(--muted);cursor:pointer;font-size:13px;transition:.15s}
        .at-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .admin-panel{display:none}.admin-panel.active{display:block}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px}
        .card h3{font-size:14px;font-weight:700;margin-bottom:14px}
        .form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
        .form-row input,.form-row select{flex:1;min-width:120px;background:var(--surface2);
          border:1px solid var(--border);color:var(--text);padding:9px 11px;
          border-radius:7px;font-size:13px}
        .form-row input:focus,.form-row select:focus{outline:none;border-color:var(--accent)}
        .prod-admin-item{display:flex;align-items:center;gap:10px;padding:10px;
          border-bottom:1px solid var(--border)}
        .prod-admin-item:last-child{border-bottom:none}

        /* ── TOAST ── */
        .toast{position:fixed;bottom:22px;right:22px;background:var(--surface);
          border:1px solid var(--border);border-radius:10px;padding:13px 18px;
          font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);
          transform:translateY(100px);opacity:0;transition:.3s;z-index:999;max-width:320px}
        .toast.show{transform:translateY(0);opacity:1}
        .toast.ok{border-color:var(--accent2)}
        .toast.err{border-color:var(--danger)}
        .toast.warn{border-color:var(--warn)}

        .source-tag{font-size:10px;padding:2px 7px;border-radius:4px;margin-left:6px;font-weight:600}
        .src-cache{background:rgba(124,106,247,.2);color:var(--accent)}
        .src-db{background:rgba(86,209,176,.2);color:var(--accent2)}
        .loader{text-align:center;color:var(--muted);padding:40px;font-size:13px}

        /* edit modal */
        .edit-modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;
          padding:26px;width:420px;max-width:95vw}
        .edit-modal h3{margin-bottom:16px;font-size:15px}
      </style>
    </head>
    <body>

    <!-- ═══════════════════════════ AUTH ═══════════════════════════ -->
    <div id="auth-screen">
      <div class="auth-box">
        <div class="auth-logo">
          <h1>🛍 ShopMicro</h1>
          <p>Plataforma e-Commerce Microserveis</p>
        </div>
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Iniciar sessió</button>
          <button class="auth-tab" onclick="switchTab('register')">Registrar-se</button>
        </div>

        <!-- LOGIN -->
        <div class="auth-form active" id="form-login">
          <div class="fg"><label>Usuari</label>
            <input id="l-user" placeholder="admin, oleguer, sergi, alex..." value="admin"></div>
          <div class="fg"><label>Contrasenya</label>
            <input type="password" id="l-pass" placeholder="••••••••" value="admin123"
              onkeydown="if(event.key==='Enter')doLogin()"></div>
          <div class="err-msg" id="l-err"></div>
          <button class="btn btn-primary btn-block" style="margin-top:16px" onclick="doLogin()">Entrar →</button>
          <div class="hint-box">
            <strong>Admin:</strong> admin / admin123<br>
            <strong>Usuaris:</strong> oleguer · sergi · alex / user123<br>
            <span style="color:var(--accent2)">✨ O crea un compte nou amb el registre</span>
          </div>
        </div>

        <!-- REGISTER -->
        <div class="auth-form" id="form-register">
          <div class="fg"><label>Nom complet</label>
            <input id="r-name" placeholder="El teu nom"></div>
          <div class="fg"><label>Nom d'usuari</label>
            <input id="r-user" placeholder="sense espais, en minúscules"></div>
          <div class="fg"><label>Contrasenya</label>
            <input type="password" id="r-pass" placeholder="Mínim 4 caràcters"
              onkeydown="if(event.key==='Enter')doRegister()"></div>
          <div class="err-msg" id="r-err"></div>
          <button class="btn btn-primary btn-block" style="margin-top:16px" onclick="doRegister()">Crear compte →</button>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════ APP ═══════════════════════════ -->
    <div id="app">
      <header>
        <div class="h-logo">🛍 ShopMicro</div>
        <nav class="h-nav">
          <button class="nav-btn active" id="nav-shop" onclick="showPage('shop',this)">🏪 Botiga</button>
          <button class="nav-btn" id="nav-orders" onclick="showPage('orders',this)">📦 Les meves comandes</button>
          <button class="nav-btn" id="nav-admin" onclick="showPage('admin',this)" style="display:none">⚙️ Admin</button>
        </nav>
        <div class="h-user">
          <button class="btn btn-ghost btn-sm cart-btn" onclick="openCart()">
            🛒 Carret <span class="cart-count" id="cart-count" style="display:none">0</span>
          </button>
          <span id="h-name" style="font-weight:600"></span>
          <span id="h-badge" class="badge"></span>
          <button class="btn btn-ghost btn-sm" onclick="logout()">Sortir</button>
        </div>
      </header>

      <main>
        <!-- ── BOTIGA ── -->
        <div class="page active" id="page-shop">
          <div class="page-header">
            <div>
              <h2>🏪 Catàleg de Productes</h2>
              <p>Afegeix al carret i finalitza la compra
                <span id="src-indicator"></span>
              </p>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="loadProducts()">↻ Actualitzar</button>
          </div>
          <div class="products-grid" id="products-grid">
            <div class="loader">Carregant productes...</div>
          </div>
        </div>

        <!-- ── COMANDES ── -->
        <div class="page" id="page-orders">
          <div class="page-header">
            <div>
              <h2 id="orders-title">📦 Les meves comandes</h2>
              <p id="orders-subtitle">Historial de les teves compres</p>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="loadOrders()">↻ Actualitzar</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>#</th><th>Producte</th><th>Unitats</th>
                <th>Total</th><th>Estat</th><th>Data</th><th>Acció</th>
              </tr></thead>
              <tbody id="orders-tbody">
                <tr><td colspan="7" class="loader">Carregant...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- ── ADMIN ── -->
        <div class="page" id="page-admin">
          <div class="page-header">
            <div><h2>⚙️ Panell d'Administració</h2>
              <p>Gestió completa de la plataforma ShopMicro</p></div>
          </div>
          <div class="stat-grid">
            <div class="stat-card"><div class="stat-num" id="st-prod">–</div><div class="stat-label">Productes</div></div>
            <div class="stat-card"><div class="stat-num" id="st-ord">–</div><div class="stat-label">Comandes</div></div>
            <div class="stat-card"><div class="stat-num" id="st-rev">–</div><div class="stat-label">Ingressos €</div></div>
            <div class="stat-card"><div class="stat-num" id="st-users">–</div><div class="stat-label">Usuaris</div></div>
          </div>
          <div class="admin-tabs">
            <button class="at-btn active" onclick="switchAdmin('products',this)">📦 Productes</button>
            <button class="at-btn" onclick="switchAdmin('orders',this)">🧾 Totes les comandes</button>
            <button class="at-btn" onclick="switchAdmin('users',this)">👥 Usuaris</button>
          </div>

          <!-- ADMIN: Productes -->
          <div class="admin-panel active" id="adm-products">
            <div class="card">
              <h3>➕ Nou producte</h3>
              <div class="form-row">
                <input id="p-name" placeholder="Nom *">
                <input id="p-price" type="number" step="0.01" placeholder="Preu € *">
                <input id="p-stock" type="number" placeholder="Stock *">
              </div>
              <div class="form-row">
                <input id="p-desc" placeholder="Descripció">
              </div>
              <button class="btn btn-primary btn-sm" onclick="createProduct()">➕ Crear producte</button>
            </div>
            <div class="card">
              <h3>📋 Llista de productes</h3>
              <div id="adm-prod-list"><div class="loader">Carregant...</div></div>
            </div>
          </div>

          <!-- ADMIN: Totes comandes -->
          <div class="admin-panel" id="adm-orders">
            <div class="table-wrap">
              <table>
                <thead><tr>
                  <th>#</th><th>Client</th><th>Producte</th>
                  <th>Unitats</th><th>Total</th><th>Estat</th><th>Data</th><th>Acció</th>
                </tr></thead>
                <tbody id="adm-orders-tbody">
                  <tr><td colspan="8" class="loader">Carregant...</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- ADMIN: Usuaris -->
          <div class="admin-panel" id="adm-users">
            <div class="table-wrap">
              <table>
                <thead><tr><th>ID</th><th>Usuari</th><th>Nom</th><th>Rol</th><th>Registrat</th></tr></thead>
                <tbody id="adm-users-tbody">
                  <tr><td colspan="5" class="loader">Carregant...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- ── CARRET MODAL ── -->
    <div class="modal-overlay" id="cart-modal">
      <div class="modal">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
          <h3>🛒 Carret de compra</h3>
          <button class="btn btn-ghost btn-sm" onclick="closeCart()">✕</button>
        </div>
        <div id="cart-items"></div>
        <div class="cart-total" id="cart-total-row" style="display:none">
          <span>Total</span><span id="cart-total-val"></span>
        </div>
        <div style="display:flex;gap:10px;margin-top:18px">
          <button class="btn btn-ghost btn-sm" onclick="closeCart()">Continuar comprant</button>
          <button class="btn btn-primary" id="checkout-btn" onclick="checkout()" style="flex:1">
            ✅ Finalitzar compra
          </button>
        </div>
      </div>
    </div>

    <!-- ── EDIT PRODUCT MODAL ── -->
    <div class="modal-overlay" id="edit-modal">
      <div class="edit-modal">
        <h3>✏️ Editar producte</h3>
        <input type="hidden" id="edit-id">
        <div class="form-row" style="margin-bottom:10px">
          <input id="edit-name" placeholder="Nom *">
        </div>
        <div class="form-row" style="margin-bottom:10px">
          <input id="edit-price" type="number" step="0.01" placeholder="Preu €">
          <input id="edit-stock" type="number" placeholder="Stock">
        </div>
        <div class="form-row" style="margin-bottom:16px">
          <input id="edit-desc" placeholder="Descripció">
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost btn-sm" onclick="closeEditModal()">Cancel·lar</button>
          <button class="btn btn-primary btn-sm" onclick="saveEdit()">Desar canvis</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    // ═══════════════════════════════════════════════════════════
    //  ESTAT GLOBAL
    // ═══════════════════════════════════════════════════════════
    const ICONS = ['💻','📱','🎧','📺','⌚','🖥','🖱','⌨️','📷','🎮','🔋','💾'];
    let currentUser = null;
    let cart = {}; // { product_id: { product, qty } }
    let allProducts = [];

    // ═══════════════════════════════════════════════════════════
    //  AUTH
    // ═══════════════════════════════════════════════════════════
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='login')));
      document.getElementById('form-login').classList.toggle('active', tab==='login');
      document.getElementById('form-register').classList.toggle('active', tab==='register');
    }

    async function doLogin() {
      const username = document.getElementById('l-user').value.trim();
      const password = document.getElementById('l-pass').value;
      const errEl = document.getElementById('l-err');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Error'; errEl.style.display='block'; return; }
        setUser(data);
      } catch(e) { errEl.textContent='Error de connexió'; errEl.style.display='block'; }
    }

    async function doRegister() {
      const name = document.getElementById('r-name').value.trim();
      const username = document.getElementById('r-user').value.trim().toLowerCase();
      const password = document.getElementById('r-pass').value;
      const errEl = document.getElementById('r-err');
      errEl.style.display='none';
      if (!name || !username || !password) { errEl.textContent='Tots els camps són obligatoris'; errEl.style.display='block'; return; }
      try {
        const res = await fetch('/api/auth/register', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({name, username, password})
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error || 'Error'; errEl.style.display='block'; return; }
        setUser(data);
        toast(`Benvingut/da, ${data.name}! 🎉`,'ok');
      } catch(e) { errEl.textContent='Error de connexió'; errEl.style.display='block'; }
    }

    function setUser(data) {
      currentUser = data;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('h-name').textContent = data.name;
      const badge = document.getElementById('h-badge');
      badge.textContent = data.role === 'admin' ? '👑 Admin' : '👤 Usuari';
      badge.className = 'badge badge-' + data.role;
      if (data.role === 'admin') document.getElementById('nav-admin').style.display = 'block';
      loadProducts();
    }

    function logout() {
      currentUser = null; cart = {};
      document.getElementById('app').style.display = 'none';
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('nav-admin').style.display = 'none';
      updateCartBadge();
    }

    // ═══════════════════════════════════════════════════════════
    //  NAVEGACIÓ
    // ═══════════════════════════════════════════════════════════
    function showPage(name, btn) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('page-'+name).classList.add('active');
      if (btn) btn.classList.add('active');
      if (name === 'orders') loadOrders();
      if (name === 'admin') loadAdmin();
    }

    function switchAdmin(panel, btn) {
      document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.at-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('adm-'+panel).classList.add('active');
      btn.classList.add('active');
      if (panel === 'orders') loadAdminOrders();
      if (panel === 'products') loadAdminProducts();
      if (panel === 'users') loadAdminUsers();
    }

    // ═══════════════════════════════════════════════════════════
    //  PRODUCTES
    // ═══════════════════════════════════════════════════════════
    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = '<div class="loader">Carregant productes...</div>';
      try {
        const res = await fetch('/api/products');
        const data = await res.json();
        allProducts = data.data || [];
        const src = data.source;
        document.getElementById('src-indicator').innerHTML =
          `<span class="source-tag ${src==='cache'?'src-cache':'src-db'}">${src==='cache'?'⚡ Redis Cache':'🗄 MySQL DB'}</span>`;
        if (!allProducts.length) { grid.innerHTML='<div class="loader">No hi ha productes</div>'; return; }
        renderProducts();
      } catch(e) { grid.innerHTML='<div class="loader" style="color:var(--danger)">Error carregant productes</div>'; }
    }

    function renderProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = allProducts.map((p,i) => {
        const inCart = cart[p.id]?.qty || 0;
        const avail = p.stock - inCart;
        return `<div class="product-card">
          <div class="p-img">${ICONS[i % ICONS.length]}</div>
          <div class="p-body">
            <div class="p-name">${esc(p.name)}</div>
            <div class="p-desc">${esc(p.description||'')}</div>
            <div class="p-footer">
              <div>
                <div class="p-price">${p.price.toFixed(2)} €</div>
                <div class="p-stock ${avail<=0?'stock-out':avail<5?'stock-low':''}">
                  ${avail<=0?'❌ Esgotat':avail<5?`⚠️ Queden ${avail}`:`✅ Stock: ${avail}`}
                </div>
              </div>
              <button class="btn btn-primary btn-sm"
                onclick="addToCart(${p.id})"
                ${avail<=0?'disabled style="opacity:.4"':''}>
                🛒 Afegir
              </button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    // ═══════════════════════════════════════════════════════════
    //  CARRET
    // ═══════════════════════════════════════════════════════════
    function addToCart(pid) {
      const p = allProducts.find(x => x.id === pid);
      if (!p) return;
      const inCart = cart[pid]?.qty || 0;
      if (inCart >= p.stock) { toast('Stock insuficient ⚠️','warn'); return; }
      if (!cart[pid]) cart[pid] = { product: p, qty: 0 };
      cart[pid].qty++;
      updateCartBadge();
      renderProducts();
      toast(`${p.name} afegit al carret 🛒`,'ok');
    }

    function updateCartBadge() {
      const total = Object.values(cart).reduce((s,i) => s+i.qty, 0);
      const el = document.getElementById('cart-count');
      el.textContent = total;
      el.style.display = total > 0 ? 'flex' : 'none';
    }

    function openCart() {
      const items = Object.values(cart);
      const el = document.getElementById('cart-items');
      if (!items.length) {
        el.innerHTML = '<div class="empty-state">El carret és buit 🛒</div>';
        document.getElementById('cart-total-row').style.display = 'none';
        document.getElementById('checkout-btn').disabled = true;
      } else {
        el.innerHTML = items.map(({product:p, qty}) => `
          <div class="cart-item">
            <div class="ci-icon">${ICONS[allProducts.findIndex(x=>x.id===p.id) % ICONS.length]}</div>
            <div class="ci-info">
              <div class="ci-name">${esc(p.name)}</div>
              <div class="ci-price">${p.price.toFixed(2)} € × ${qty} = <strong>${(p.price*qty).toFixed(2)} €</strong></div>
            </div>
            <div class="ci-qty">
              <button class="qty-btn" onclick="changeQty(${p.id},-1)">−</button>
              <span>${qty}</span>
              <button class="qty-btn" onclick="changeQty(${p.id},1)">+</button>
            </div>
          </div>`).join('');
        const total = items.reduce((s,{product:p,qty}) => s+p.price*qty, 0);
        document.getElementById('cart-total-val').textContent = total.toFixed(2)+' €';
        document.getElementById('cart-total-row').style.display = 'flex';
        document.getElementById('checkout-btn').disabled = false;
      }
      document.getElementById('cart-modal').classList.add('open');
    }

    function changeQty(pid, delta) {
      if (!cart[pid]) return;
      const p = allProducts.find(x => x.id === pid);
      cart[pid].qty += delta;
      if (cart[pid].qty <= 0) delete cart[pid];
      else if (p && cart[pid].qty > p.stock) { cart[pid].qty = p.stock; toast('Stock màxim assolit','warn'); }
      updateCartBadge();
      openCart();
      renderProducts();
    }

    function closeCart() { document.getElementById('cart-modal').classList.remove('open'); }

    async function checkout() {
      if (!currentUser) { closeCart(); toast('Has d\'iniciar sessió per comprar','warn'); return; }
      const items = Object.values(cart);
      if (!items.length) return;
      document.getElementById('checkout-btn').disabled = true;
      document.getElementById('checkout-btn').textContent = 'Processant...';
      let ok = 0, fail = 0;
      for (const {product:p, qty} of items) {
        try {
          const res = await fetch('/api/orders', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({product_id: p.id, quantity: qty, user_name: currentUser.username})
          });
          const data = await res.json();
          if (res.ok) ok++;
          else { fail++; toast(`❌ ${p.name}: ${data.error}`,'err'); }
        } catch(e) { fail++; }
      }
      cart = {};
      updateCartBadge();
      closeCart();
      if (ok > 0) toast(`✅ ${ok} comanda${ok>1?'es':''} creada${ok>1?'es':''}! Gràcies per la compra 🎉`,'ok');
      document.getElementById('checkout-btn').disabled = false;
      document.getElementById('checkout-btn').innerHTML = '✅ Finalitzar compra';
      loadProducts();
    }

    // ═══════════════════════════════════════════════════════════
    //  COMANDES (usuari)
    // ═══════════════════════════════════════════════════════════
    async function loadOrders() {
      const isAdmin = currentUser?.role === 'admin';
      document.getElementById('orders-title').textContent = isAdmin ? '📦 Totes les comandes' : '📦 Les meves comandes';
      document.getElementById('orders-subtitle').textContent = isAdmin
        ? 'Totes les comandes de tots els usuaris'
        : 'Historial de les teves compres';
      const tbody = document.getElementById('orders-tbody');
      tbody.innerHTML = '<tr><td colspan="7" class="loader">Carregant...</td></tr>';
      try {
        // Usuari normal: filtra per ell. Admin: veu tot (via pàgina admin)
        const url = isAdmin ? '/api/orders' : `/api/orders?user=${currentUser.username}`;
        const res = await fetch(url);
        const data = await res.json();
        const orders = data.data || [];
        if (!orders.length) {
          tbody.innerHTML = `<tr><td colspan="7" class="loader">Cap comanda</td></tr>`;
          return;
        }
        tbody.innerHTML = orders.map(o => `
          <tr>
            <td><strong>#${o.id}</strong></td>
            <td>${esc(o.product_name)}</td>
            <td>${o.quantity}</td>
            <td><strong>${o.total_price.toFixed(2)} €</strong></td>
            <td><span class="s-badge s-${o.status}">${o.status}</span></td>
            <td style="color:var(--muted);font-size:12px">${(o.created_at||'').slice(0,16)}</td>
            <td>${o.status!=='cancelled'
              ? `<button class="btn btn-danger btn-sm" onclick="cancelOrder(${o.id})">✕ Cancel·lar</button>`
              : '–'}</td>
          </tr>`).join('');
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="7" style="color:var(--danger);text-align:center">Error</td></tr>';
      }
    }

    async function cancelOrder(oid) {
      if (!confirm(`Cancel·lar la comanda #${oid}? Es restaurarà el stock.`)) return;
      try {
        const res = await fetch(`/api/orders/${oid}/cancel`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({user_name: currentUser.username, role: currentUser.role})
        });
        const data = await res.json();
        if (res.ok) { toast(data.message,'ok'); loadOrders(); loadProducts(); }
        else toast('❌ '+data.error,'err');
      } catch(e) { toast('❌ Error de connexió','err'); }
    }

    // ═══════════════════════════════════════════════════════════
    //  ADMIN
    // ═══════════════════════════════════════════════════════════
    async function loadAdmin() {
      try {
        const [pRes, oRes, uRes] = await Promise.all([
          fetch('/api/products'), fetch('/api/orders'), fetch('/api/users')
        ]);
        const [pD, oD, uD] = await Promise.all([pRes.json(), oRes.json(), uRes.json()]);
        const prods = pD.data||[], ords = oD.data||[], users = uD.data||[];
        const rev = ords.filter(o=>o.status!=='cancelled').reduce((s,o) => s+o.total_price, 0);
        document.getElementById('st-prod').textContent = prods.length;
        document.getElementById('st-ord').textContent = ords.length;
        document.getElementById('st-rev').textContent = rev.toFixed(0);
        document.getElementById('st-users').textContent = users.length;
        loadAdminProducts();
      } catch(e) { console.error(e); }
    }

    async function loadAdminProducts() {
      const res = await fetch('/api/products');
      const data = await res.json();
      const prods = data.data || [];
      const el = document.getElementById('adm-prod-list');
      el.innerHTML = prods.map((p,i) => `
        <div class="prod-admin-item">
          <span style="font-size:22px">${ICONS[i%ICONS.length]}</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${esc(p.name)}</div>
            <div style="font-size:11px;color:var(--muted)">${p.price.toFixed(2)} € · Stock: ${p.stock}</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="openEditModal(${p.id},'${esc(p.name).replace(/'/g,"\\'")}',${p.price},${p.stock},'${esc(p.description||'').replace(/'/g,"\\'")}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑</button>
        </div>`).join('');
    }

    async function loadAdminOrders() {
      const res = await fetch('/api/orders');
      const data = await res.json();
      const orders = data.data||[];
      const tbody = document.getElementById('adm-orders-tbody');
      tbody.innerHTML = orders.map(o => `
        <tr>
          <td><strong>#${o.id}</strong></td>
          <td>${esc(o.user_name)}</td>
          <td>${esc(o.product_name)}</td>
          <td>${o.quantity}</td>
          <td>${o.total_price.toFixed(2)} €</td>
          <td>
            <select class="form-row" style="padding:5px;border-radius:6px;font-size:12px;width:auto"
              onchange="updateOrderStatus(${o.id},this.value)">
              ${['confirmed','pending','cancelled'].map(s =>
                `<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </td>
          <td style="font-size:12px;color:var(--muted)">${(o.created_at||'').slice(0,16)}</td>
          <td>${o.status!=='cancelled'
            ? `<button class="btn btn-danger btn-sm" onclick="cancelOrder(${o.id})">✕</button>`
            : '–'}</td>
        </tr>`).join('');
    }

    async function loadAdminUsers() {
      const res = await fetch('/api/users');
      const data = await res.json();
      const users = data.data||[];
      document.getElementById('adm-users-tbody').innerHTML = users.map(u => `
        <tr>
          <td>#${u.id}</td>
          <td><strong>${esc(u.username)}</strong></td>
          <td>${esc(u.name)}</td>
          <td><span class="badge badge-${u.role}">${u.role}</span></td>
          <td style="font-size:12px;color:var(--muted)">${(u.created_at||'').slice(0,16)}</td>
        </tr>`).join('');
    }

    async function createProduct() {
      const body = {
        name: document.getElementById('p-name').value,
        description: document.getElementById('p-desc').value,
        price: parseFloat(document.getElementById('p-price').value),
        stock: parseInt(document.getElementById('p-stock').value)||0,
      };
      if (!body.name || !body.price) { toast('Nom i preu obligatoris','err'); return; }
      const res = await fetch('/api/products',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data = await res.json();
      if (res.ok) {
        toast('✅ Producte creat!','ok');
        ['p-name','p-desc','p-price','p-stock'].forEach(id => document.getElementById(id).value='');
        loadAdminProducts(); loadAdmin();
      } else toast('❌ '+data.error,'err');
    }

    async function deleteProduct(id) {
      if (!confirm('Eliminar aquest producte?')) return;
      const res = await fetch('/api/products/'+id,{method:'DELETE'});
      if (res.ok) { toast('🗑 Producte eliminat','ok'); loadAdminProducts(); loadAdmin(); }
      else toast('❌ Error eliminant','err');
    }

    function openEditModal(id, name, price, stock, desc) {
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-name').value = name;
      document.getElementById('edit-price').value = price;
      document.getElementById('edit-stock').value = stock;
      document.getElementById('edit-desc').value = desc;
      document.getElementById('edit-modal').classList.add('open');
    }

    function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }

    async function saveEdit() {
      const id = document.getElementById('edit-id').value;
      const body = {
        name: document.getElementById('edit-name').value,
        price: parseFloat(document.getElementById('edit-price').value),
        stock: parseInt(document.getElementById('edit-stock').value)||0,
        description: document.getElementById('edit-desc').value,
      };
      const res = await fetch('/api/products/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if (res.ok) {
        toast('✅ Producte actualitzat','ok');
        closeEditModal(); loadAdminProducts(); loadProducts();
      } else { const d = await res.json(); toast('❌ '+d.error,'err'); }
    }

    async function updateOrderStatus(oid, status) {
      await fetch(`/api/orders/${oid}`,{
        method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({status})
      });
      toast('Estat actualitzat','ok');
    }

    // ═══════════════════════════════════════════════════════════
    //  UTILS
    // ═══════════════════════════════════════════════════════════
    function toast(msg, type='ok') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast show '+type;
      setTimeout(() => t.className = 'toast', 3500);
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Tancar modals clicant fora
    document.getElementById('cart-modal').addEventListener('click', e => { if(e.target.id==='cart-modal') closeCart(); });
    document.getElementById('edit-modal').addEventListener('click', e => { if(e.target.id==='edit-modal') closeEditModal(); });
    </script>
    </body>
    </html>
