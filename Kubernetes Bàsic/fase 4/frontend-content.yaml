apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: shopmicro
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="ca">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>ShopMicro</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
          --bg: #0f0f13;
          --surface: #1a1a24;
          --surface2: #22222f;
          --border: #2e2e42;
          --accent: #7c6af7;
          --accent2: #56d1b0;
          --danger: #f76a6a;
          --text: #e8e8f0;
          --muted: #7a7a9a;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

        /* LOGIN */
        #login-screen {
          display: flex; align-items: center; justify-content: center;
          min-height: 100vh;
          background: radial-gradient(ellipse at 60% 40%, #1e1040 0%, #0f0f13 70%);
        }
        .login-box {
          background: var(--surface); border: 1px solid var(--border);
          border-radius: 16px; padding: 48px 40px; width: 380px;
          box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo h1 { font-size: 28px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-logo p { color: var(--muted); font-size: 13px; margin-top: 4px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input {
          width: 100%; background: var(--surface2); border: 1px solid var(--border);
          color: var(--text); padding: 12px 14px; border-radius: 8px; font-size: 14px;
          transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .btn {
          padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer;
          font-size: 14px; font-weight: 600; transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; width: 100%; }
        .btn-primary:hover { background: #6a59e0; transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 6px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .login-hint { margin-top: 20px; padding: 12px; background: var(--surface2); border-radius: 8px; font-size: 12px; color: var(--muted); }
        .login-hint strong { color: var(--text); }
        #login-error { color: var(--danger); font-size: 13px; margin-top: 10px; display: none; }

        /* APP SHELL */
        #app { display: none; }
        header {
          background: var(--surface); border-bottom: 1px solid var(--border);
          padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between;
          position: sticky; top: 0; z-index: 100;
        }
        .header-logo { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-nav { display: flex; gap: 4px; }
        .nav-btn {
          padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
          background: transparent; color: var(--muted); font-size: 14px; font-weight: 500; transition: all 0.15s;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--surface2); color: var(--text); }
        .nav-btn.active { color: var(--accent); }
        .header-user { display: flex; align-items: center; gap: 12px; font-size: 13px; }
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-admin { background: rgba(124,106,247,0.2); color: var(--accent); }
        .badge-user { background: rgba(86,209,176,0.2); color: var(--accent2); }

        /* CONTENT */
        main { padding: 32px; max-width: 1200px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        h2 { font-size: 22px; margin-bottom: 24px; }
        .subtitle { color: var(--muted); font-size: 14px; margin-top: 4px; }

        /* CARDS */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .product-card {
          background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
          overflow: hidden; transition: transform 0.2s, border-color 0.2s;
        }
        .product-card:hover { transform: translateY(-3px); border-color: var(--accent); }
        .product-img { width: 100%; height: 140px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .product-body { padding: 16px; }
        .product-name { font-weight: 600; margin-bottom: 6px; }
        .product-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.4; }
        .product-footer { display: flex; align-items: center; justify-content: space-between; }
        .product-price { font-size: 18px; font-weight: 700; color: var(--accent2); }
        .product-stock { font-size: 11px; color: var(--muted); }
        .stock-low { color: var(--danger); }

        /* ORDERS */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 16px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--surface2); }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .status-confirmed { background: rgba(86,209,176,0.15); color: var(--accent2); }
        .status-pending { background: rgba(247,106,106,0.15); color: var(--danger); }

        /* ADMIN */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
        .card h3 { margin-bottom: 16px; font-size: 16px; }
        .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .form-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 13px; }
        .form-row input:focus { outline: none; border-color: var(--accent); }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
        .stat-num { font-size: 28px; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
        .toast {
          position: fixed; bottom: 24px; right: 24px; background: var(--surface);
          border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px;
          font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
          transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 999;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: var(--accent2); }
        .toast.error { border-color: var(--danger); }
        .loading { text-align: center; color: var(--muted); padding: 40px; }
        .source-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
        .source-cache { background: rgba(124,106,247,0.2); color: var(--accent); }
        .source-db { background: rgba(86,209,176,0.2); color: var(--accent2); }
        .emoji { font-style: normal; }
      </style>
    </head>
    <body>

    <!-- LOGIN -->
    <div id="login-screen">
      <div class="login-box">
        <div class="login-logo">
          <h1>🛍 ShopMicro</h1>
          <p>Plataforma e-Commerce Microserveis</p>
        </div>
        <div class="form-group">
          <label>Usuari</label>
          <input type="text" id="inp-user" placeholder="admin o user" value="admin">
        </div>
        <div class="form-group">
          <label>Contrasenya</label>
          <input type="password" id="inp-pass" placeholder="••••••••" value="admin123"
            onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <div id="login-error">❌ Credencials incorrectes</div>
        <button class="btn btn-primary" style="margin-top:16px" onclick="doLogin()">Entrar</button>
        <div class="login-hint">
          <strong>Admin:</strong> admin / admin123<br>
          <strong>Usuari:</strong> user / user123
        </div>
      </div>
    </div>

    <!-- APP -->
    <div id="app">
      <header>
        <div class="header-logo">🛍 ShopMicro</div>
        <nav class="header-nav">
          <button class="nav-btn active" onclick="showPage('shop')">🏪 Botiga</button>
          <button class="nav-btn" onclick="showPage('orders')">📦 Comandes</button>
          <button class="nav-btn" id="admin-nav-btn" onclick="showPage('admin')" style="display:none">⚙️ Admin</button>
        </nav>
        <div class="header-user">
          <span id="header-name"></span>
          <span id="header-badge" class="badge"></span>
          <button class="btn btn-sm btn-outline" onclick="logout()">Sortir</button>
        </div>
      </header>

      <main>
        <!-- BOTIGA -->
        <div class="page active" id="page-shop">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
            <div>
              <h2>Catàleg de Productes</h2>
              <p class="subtitle">Fes clic a "Comprar" per crear una comanda real</p>
            </div>
            <div id="cache-indicator" style="margin-left:auto;font-size:12px;color:var(--muted)"></div>
          </div>
          <div class="products-grid" id="products-grid">
            <div class="loading">Carregant productes...</div>
          </div>
        </div>

        <!-- COMANDES -->
        <div class="page" id="page-orders">
          <h2>📦 Comandes</h2>
          <p class="subtitle" style="margin-bottom:24px">Historial de totes les comandes del sistema</p>
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
            <table>
              <thead>
                <tr>
                  <th>#ID</th>
                  <th>Client</th>
                  <th>Producte</th>
                  <th>Quantitat</th>
                  <th>Total</th>
                  <th>Estat</th>
                  <th>Data</th>
                </tr>
              </thead>
              <tbody id="orders-tbody">
                <tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px">Carregant...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- ADMIN -->
        <div class="page" id="page-admin">
          <h2>⚙️ Panell d'Administració</h2>
          <div class="stat-grid" id="admin-stats">
            <div class="stat-card"><div class="stat-num" id="stat-products">-</div><div class="stat-label">Productes</div></div>
            <div class="stat-card"><div class="stat-num" id="stat-orders">-</div><div class="stat-label">Comandes</div></div>
            <div class="stat-card"><div class="stat-num" id="stat-revenue">-</div><div class="stat-label">Ingressos (€)</div></div>
          </div>
          <div class="admin-grid">
            <div class="card">
              <h3>➕ Afegir Producte</h3>
              <div class="form-row"><input id="p-name" placeholder="Nom del producte"></div>
              <div class="form-row"><input id="p-desc" placeholder="Descripció"></div>
              <div class="form-row">
                <input id="p-price" placeholder="Preu (€)" type="number" step="0.01">
                <input id="p-stock" placeholder="Stock" type="number">
              </div>
              <button class="btn btn-primary btn-sm" onclick="createProduct()">Crear Producte</button>
            </div>
            <div class="card">
              <h3>🗄️ Gestió de Productes</h3>
              <div id="admin-products-list" style="max-height:280px;overflow-y:auto">
                <div class="loading">Carregant...</div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let currentUser = null;
      let currentToken = null;
      const ICONS = ['💻','📱','🎧','📺','⌚','🖥','🖱','⌨️','📷','🎮'];

      // AUTH
      async function doLogin() {
        const username = document.getElementById('inp-user').value;
        const password = document.getElementById('inp-pass').value;
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({username, password})
          });
          const data = await res.json();
          if (!res.ok) {
            document.getElementById('login-error').style.display = 'block';
            return;
          }
          currentUser = data;
          currentToken = data.token;
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app').style.display = 'block';
          document.getElementById('header-name').textContent = data.name;
          const badge = document.getElementById('header-badge');
          badge.textContent = data.role === 'admin' ? '👑 Admin' : '👤 Usuari';
          badge.className = 'badge ' + (data.role === 'admin' ? 'badge-admin' : 'badge-user');
          if (data.role === 'admin') {
            document.getElementById('admin-nav-btn').style.display = 'block';
          }
          loadProducts();
        } catch(e) {
          document.getElementById('login-error').style.display = 'block';
        }
      }

      function logout() {
        currentUser = null; currentToken = null;
        document.getElementById('app').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
      }

      // NAVIGATION
      function showPage(name) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + name).classList.add('active');
        event.target.classList.add('active');
        if (name === 'orders') loadOrders();
        if (name === 'admin') loadAdmin();
      }

      // PRODUCTS
      async function loadProducts() {
        try {
          const res = await fetch('/api/products');
          const data = await res.json();
          const grid = document.getElementById('products-grid');
          const src = data.source;
          document.getElementById('cache-indicator').innerHTML =
            `Font: <span class="source-tag ${src === 'cache' ? 'source-cache' : 'source-db'}">${src === 'cache' ? '⚡ Redis Cache' : '🗄️ MySQL DB'}</span>`;

          if (!data.data || data.data.length === 0) {
            grid.innerHTML = '<div class="loading">No hi ha productes</div>';
            return;
          }
          grid.innerHTML = data.data.map((p, i) => `
            <div class="product-card">
              <div class="product-img">${ICONS[i % ICONS.length]}</div>
              <div class="product-body">
                <div class="product-name">${p.name}</div>
                <div class="product-desc">${p.description || ''}</div>
                <div class="product-footer">
                  <div>
                    <div class="product-price">${p.price.toFixed(2)}€</div>
                    <div class="product-stock ${p.stock < 5 ? 'stock-low' : ''}">
                      ${p.stock < 5 ? '⚠️' : '✅'} Stock: ${p.stock}
                    </div>
                  </div>
                  <button class="btn btn-primary btn-sm" onclick="buyProduct(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.price})"
                    ${p.stock === 0 ? 'disabled style="opacity:0.4"' : ''}>
                    ${p.stock === 0 ? 'Esgotat' : 'Comprar'}
                  </button>
                </div>
              </div>
            </div>
          `).join('');
        } catch(e) {
          document.getElementById('products-grid').innerHTML = '<div class="loading">Error carregant productes</div>';
        }
      }

      async function buyProduct(id, name, price) {
        const qty = 1;
        try {
          const res = await fetch('/api/orders', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
              product_id: id,
              quantity: qty,
              user_name: currentUser?.username || 'anonymous'
            })
          });
          const data = await res.json();
          if (!res.ok) {
            showToast('❌ ' + (data.error || 'Error'), 'error');
          } else {
            showToast(`✅ Comanda #${data.order_id} creada! Total: ${data.total.toFixed(2)}€`, 'success');
            loadProducts();
          }
        } catch(e) {
          showToast('❌ Error de connexió', 'error');
        }
      }

      // ORDERS
      async function loadOrders() {
        try {
          const res = await fetch('/api/orders');
          const data = await res.json();
          const tbody = document.getElementById('orders-tbody');
          if (!data.data || data.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px">Cap comanda encara</td></tr>';
            return;
          }
          tbody.innerHTML = data.data.map(o => `
            <tr>
              <td><strong>#${o.id}</strong></td>
              <td>${o.user_name}</td>
              <td>${o.product_name}</td>
              <td>${o.quantity}</td>
              <td><strong>${o.total_price.toFixed(2)}€</strong></td>
              <td><span class="status-badge status-${o.status}">${o.status}</span></td>
              <td style="color:var(--muted);font-size:12px">${o.created_at?.slice(0,16) || '-'}</td>
            </tr>
          `).join('');
        } catch(e) {
          document.getElementById('orders-tbody').innerHTML = '<tr><td colspan="7" style="color:var(--danger)">Error carregant comandes</td></tr>';
        }
      }

      // ADMIN
      async function loadAdmin() {
        if (currentUser?.role !== 'admin') return;
        try {
          const [pRes, oRes] = await Promise.all([fetch('/api/products'), fetch('/api/orders')]);
          const pData = await pRes.json();
          const oData = await oRes.json();
          const products = pData.data || [];
          const orders = oData.data || [];
          const revenue = orders.reduce((s, o) => s + o.total_price, 0);
          document.getElementById('stat-products').textContent = products.length;
          document.getElementById('stat-orders').textContent = orders.length;
          document.getElementById('stat-revenue').textContent = revenue.toFixed(0);

          const list = document.getElementById('admin-products-list');
          list.innerHTML = products.map((p, i) => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px;border-bottom:1px solid var(--border)">
              <div>
                <div style="font-size:13px;font-weight:600">${ICONS[i % ICONS.length]} ${p.name}</div>
                <div style="font-size:11px;color:var(--muted)">${p.price.toFixed(2)}€ · Stock: ${p.stock}</div>
              </div>
              <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑</button>
            </div>
          `).join('');
        } catch(e) {
          console.error(e);
        }
      }

      async function createProduct() {
        const body = {
          name: document.getElementById('p-name').value,
          description: document.getElementById('p-desc').value,
          price: parseFloat(document.getElementById('p-price').value),
          stock: parseInt(document.getElementById('p-stock').value) || 0,
        };
        if (!body.name || !body.price) { showToast('❌ Nom i preu obligatoris', 'error'); return; }
        try {
          const res = await fetch('/api/products', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(body)
          });
          const data = await res.json();
          if (res.ok) {
            showToast('✅ Producte creat!', 'success');
            ['p-name','p-desc','p-price','p-stock'].forEach(id => document.getElementById(id).value = '');
            loadAdmin();
          } else {
            showToast('❌ ' + data.error, 'error');
          }
        } catch(e) {
          showToast('❌ Error de connexió', 'error');
        }
      }

      async function deleteProduct(id) {
        if (!confirm('Eliminar aquest producte?')) return;
        try {
          await fetch('/api/products/' + id, {method: 'DELETE'});
          showToast('🗑 Producte eliminat', 'success');
          loadAdmin();
        } catch(e) {
          showToast('❌ Error', 'error');
        }
      }

      // TOAST
      function showToast(msg, type='success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show ' + type;
        setTimeout(() => t.className = 'toast', 3500);
      }
    </script>
    </body>
    </html>
