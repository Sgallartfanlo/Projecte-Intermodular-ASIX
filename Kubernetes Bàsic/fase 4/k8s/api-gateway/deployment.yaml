apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shopmicro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: gateway
        image: nginx
        ports:
        - containerPort: 80
