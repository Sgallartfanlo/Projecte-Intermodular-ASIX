apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-products
  namespace: shopmicro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-products
  template:
    metadata:
      labels:
        app: db-products
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shopmicro-secrets
              key: mysql-root-password
        - name: MYSQL_DATABASE
          value: "shop_products"
        ports:
        - containerPort: 3306
        livenessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost"]
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: db-products
  namespace: shopmicro
spec:
  selector:
    app: db-products
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
---
