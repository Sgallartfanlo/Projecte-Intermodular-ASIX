# ============================================================
# PRODUCT SERVICE
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shopmicro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-api
        image: python:3.9-slim
        command: ["/bin/bash", "/app/start.sh"]
        ports:
        - containerPort: 5000
        env:
        - name: MYSQL_HOST
          valueFrom:
            configMapKeyRef:
              name: shopmicro-config
              key: MYSQL_HOST_PRODUCTS
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shopmicro-secrets
              key: mysql-root-password
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: shopmicro-config
              key: REDIS_HOST
        volumeMounts:
        - name: api-code
          mountPath: /app
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: api-code
        configMap:
          name: product-api-code
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: shopmicro
spec:
  selector:
    app: product-service
  ports:
  - port: 5000
---
