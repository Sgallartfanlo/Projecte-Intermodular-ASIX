        image: python:3.9-slim
        command: ["/bin/bash", "/app/start.sh"]
        env:
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: shopmicro-config
              key: RABBITMQ_HOST
        volumeMounts:
        - name: worker-code
          mountPath: /app
      volumes:
