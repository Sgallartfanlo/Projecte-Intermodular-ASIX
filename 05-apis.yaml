# ============================================================
# USER SERVICE - Flask API amb login i JWT
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-api-code
  namespace: shopmicro
data:
  app.py: |
    from flask import Flask, jsonify, request
    import hashlib
    import json
    import base64
    import os

    app = Flask(__name__)

    # Usuaris hardcoded (en producció seria BD)
    USERS = {
        'admin': {'password': hashlib.sha256('admin123'.encode()).hexdigest(), 'role': 'admin', 'name': 'Administrador'},
        'user': {'password': hashlib.sha256('user123'.encode()).hexdigest(), 'role': 'user', 'name': 'Usuari Demo'},
    }

    def make_token(username, role):
        payload = json.dumps({'username': username, 'role': role})
        return base64.b64encode(payload.encode()).decode()

    @app.route('/health')
    def health():
        return jsonify({'status': 'ok', 'service': 'user-service'})

    @app.route('/api/auth/login', methods=['POST'])
    def login():
        data = request.get_json()
        username = data.get('username', '')
        password = data.get('password', '')
        hashed = hashlib.sha256(password.encode()).hexdigest()

        user = USERS.get(username)
        if not user or user['password'] != hashed:
            return jsonify({'error': 'Credencials incorrectes'}), 401

        token = make_token(username, user['role'])
        return jsonify({
            'token': token,
            'username': username,
            'role': user['role'],
            'name': user['name']
        })

    @app.route('/api/auth/verify', methods=['POST'])
    def verify():
        data = request.get_json()
        token = data.get('token', '')
        try:
            payload = json.loads(base64.b64decode(token).decode())
            return jsonify({'valid': True, 'user': payload})
        except:
            return jsonify({'valid': False}), 401

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=5000)

  start.sh: |
    #!/bin/bash
    pip install flask --quiet
    python /app/app.py
---
# ============================================================
# NOTIFICATION SERVICE - Worker RabbitMQ
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-code
  namespace: shopmicro
data:
  app.py: |
    import pika
    import json
    import os
    import time
    import datetime

    RABBITMQ_HOST = os.environ.get('RABBITMQ_HOST', 'message-queue')

    def callback(ch, method, properties, body):
        msg = json.loads(body)
        ts = datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')
        print(f"[{ts}] NOTIFICACIÓ: Nova comanda #{msg.get('order_id')} - "
              f"Client: {msg.get('user')} - "
              f"Producte: {msg.get('product')} x{msg.get('quantity')} - "
              f"Total: {msg.get('total')}€")
        ch.basic_ack(delivery_tag=method.delivery_tag)

    def main():
        while True:
            try:
                conn = pika.BlockingConnection(pika.ConnectionParameters(host=RABBITMQ_HOST))
                channel = conn.channel()
                channel.queue_declare(queue='orders', durable=True)
                channel.basic_qos(prefetch_count=1)
                channel.basic_consume(queue='orders', on_message_callback=callback)
                print(f"[*] Notification service escoltant RabbitMQ a {RABBITMQ_HOST}...")
                channel.start_consuming()
            except Exception as e:
                print(f"Error connectant a RabbitMQ: {e}. Reintentant en 5s...")
                time.sleep(5)

    if __name__ == '__main__':
        main()

  start.sh: |
    #!/bin/bash
    pip install pika --quiet
    python /app/app.py
