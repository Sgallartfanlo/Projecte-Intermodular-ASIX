# ============================================================
# PRODUCT SERVICE - Flask API real
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-api-code
  namespace: shopmicro
data:
  app.py: |
    from flask import Flask, jsonify, request
    import mysql.connector
    import redis
    import json
    import os

    app = Flask(__name__)

    def get_db():
        return mysql.connector.connect(
            host=os.environ.get('MYSQL_HOST', 'db-products'),
            user='root',
            password=os.environ.get('MYSQL_ROOT_PASSWORD', 'root'),
            database='shop_products'
        )

    def get_redis():
        return redis.Redis(host=os.environ.get('REDIS_HOST', 'cache'), port=6379, decode_responses=True)

    def init_db():
        try:
            db = get_db()
            cursor = db.cursor()
            cursor.execute("""
                CREATE TABLE IF NOT EXISTS products (
                    id INT AUTO_INCREMENT PRIMARY KEY,
                    name VARCHAR(255) NOT NULL,
                    description TEXT,
                    price DECIMAL(10,2) NOT NULL,
                    stock INT DEFAULT 0,
                    image_url VARCHAR(500)
                )
            """)
            cursor.execute("SELECT COUNT(*) FROM products")
            count = cursor.fetchone()[0]
            if count == 0:
                sample = [
                    ('MacBook Pro M3', 'Portàtil Apple amb chip M3', 2499.99, 15, 'https://via.placeholder.com/200x150?text=MacBook'),
                    ('iPhone 15 Pro', 'Smartphone Apple 256GB', 1199.99, 30, 'https://via.placeholder.com/200x150?text=iPhone'),
                    ('AirPods Pro', 'Auriculars amb cancel·lació de soroll', 279.99, 50, 'https://via.placeholder.com/200x150?text=AirPods'),
                    ('iPad Air', 'Tablet Apple 10.9 pulgades', 749.99, 20, 'https://via.placeholder.com/200x150?text=iPad'),
                    ('Apple Watch S9', 'Rellotge intel·ligent GPS', 449.99, 25, 'https://via.placeholder.com/200x150?text=Watch'),
                    ('Samsung 4K TV', 'Televisió 55 pulgades QLED', 899.99, 10, 'https://via.placeholder.com/200x150?text=TV'),
                ]
                cursor.executemany(
                    "INSERT INTO products (name, description, price, stock, image_url) VALUES (%s,%s,%s,%s,%s)",
                    sample
                )
            db.commit()
            cursor.close()
            db.close()
        except Exception as e:
            print(f"DB init error: {e}")

    @app.before_request
    def before():
        pass

    @app.route('/health')
    def health():
        return jsonify({'status': 'ok', 'service': 'product-service'})

    @app.route('/api/products', methods=['GET'])
    def get_products():
        try:
            r = get_redis()
            cached = r.get('products:all')
            if cached:
                return jsonify({'data': json.loads(cached), 'source': 'cache'})
        except:
            pass
        try:
            db = get_db()
            cursor = db.cursor(dictionary=True)
            cursor.execute("SELECT * FROM products")
            products = cursor.fetchall()
            for p in products:
                p['price'] = float(p['price'])
            cursor.close()
            db.close()
            try:
                r.setex('products:all', 60, json.dumps(products))
            except:
                pass
            return jsonify({'data': products, 'source': 'db'})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/products/<int:product_id>', methods=['GET'])
    def get_product(product_id):
        try:
            db = get_db()
            cursor = db.cursor(dictionary=True)
            cursor.execute("SELECT * FROM products WHERE id=%s", (product_id,))
            product = cursor.fetchone()
            cursor.close()
            db.close()
            if not product:
                return jsonify({'error': 'Not found'}), 404
            product['price'] = float(product['price'])
            return jsonify(product)
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/products', methods=['POST'])
    def create_product():
        data = request.get_json()
        try:
            db = get_db()
            cursor = db.cursor()
            cursor.execute(
                "INSERT INTO products (name, description, price, stock, image_url) VALUES (%s,%s,%s,%s,%s)",
                (data['name'], data.get('description',''), data['price'], data.get('stock',0), data.get('image_url',''))
            )
            db.commit()
            new_id = cursor.lastrowid
            cursor.close()
            db.close()
            try:
                get_redis().delete('products:all')
            except:
                pass
            return jsonify({'id': new_id, 'message': 'Producte creat'}), 201
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/products/<int:product_id>/stock', methods=['PATCH'])
    def update_stock(product_id):
        data = request.get_json()
        delta = data.get('delta', 0)
        try:
            db = get_db()
            cursor = db.cursor()
            cursor.execute("UPDATE products SET stock = stock + %s WHERE id=%s", (delta, product_id))
            db.commit()
            cursor.close()
            db.close()
            try:
                get_redis().delete('products:all')
            except:
                pass
            return jsonify({'message': 'Stock actualitzat'})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/products/<int:product_id>', methods=['DELETE'])
    def delete_product(product_id):
        try:
            db = get_db()
            cursor = db.cursor()
            cursor.execute("DELETE FROM products WHERE id=%s", (product_id,))
            db.commit()
            cursor.close()
            db.close()
            try:
                get_redis().delete('products:all')
            except:
                pass
            return jsonify({'message': 'Producte eliminat'})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    if __name__ == '__main__':
        init_db()
        app.run(host='0.0.0.0', port=5000)

  start.sh: |
    #!/bin/bash
    pip install flask mysql-connector-python redis --quiet
    python /app/app.py
---
# ============================================================
# ORDER SERVICE - Flask API real
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-api-code
  namespace: shopmicro
data:
  app.py: |
    from flask import Flask, jsonify, request
    import mysql.connector
    import pika
    import json
    import os
    import datetime

    app = Flask(__name__)

    def get_db():
        return mysql.connector.connect(
            host=os.environ.get('MYSQL_HOST', 'db-orders'),
            user='root',
            password=os.environ.get('MYSQL_ROOT_PASSWORD', 'root'),
            database='shop_orders'
        )

    def get_products_db():
        return mysql.connector.connect(
            host=os.environ.get('MYSQL_HOST_PRODUCTS', 'db-products'),
            user='root',
            password=os.environ.get('MYSQL_ROOT_PASSWORD', 'root'),
            database='shop_products'
        )

    def init_db():
        try:
            db = get_db()
            cursor = db.cursor()
            cursor.execute("""
                CREATE TABLE IF NOT EXISTS orders (
                    id INT AUTO_INCREMENT PRIMARY KEY,
                    user_name VARCHAR(255) NOT NULL,
                    product_id INT NOT NULL,
                    product_name VARCHAR(255),
                    quantity INT DEFAULT 1,
                    total_price DECIMAL(10,2),
                    status VARCHAR(50) DEFAULT 'pending',
                    created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                )
            """)
            db.commit()
            cursor.close()
            db.close()
        except Exception as e:
            print(f"DB init error: {e}")

    def publish_to_rabbitmq(message):
        try:
            conn = pika.BlockingConnection(pika.ConnectionParameters(
                host=os.environ.get('RABBITMQ_HOST', 'message-queue'),
                heartbeat=10
            ))
            channel = conn.channel()
            channel.queue_declare(queue='orders', durable=True)
            channel.basic_publish(
                exchange='',
                routing_key='orders',
                body=json.dumps(message),
                properties=pika.BasicProperties(delivery_mode=2)
            )
            conn.close()
        except Exception as e:
            print(f"RabbitMQ error: {e}")

    @app.route('/health')
    def health():
        return jsonify({'status': 'ok', 'service': 'order-service'})

    @app.route('/api/orders', methods=['GET'])
    def get_orders():
        try:
            db = get_db()
            cursor = db.cursor(dictionary=True)
            cursor.execute("SELECT * FROM orders ORDER BY created_at DESC")
            orders = cursor.fetchall()
            for o in orders:
                o['total_price'] = float(o['total_price']) if o['total_price'] else 0
                o['created_at'] = str(o['created_at'])
            cursor.close()
            db.close()
            return jsonify({'data': orders})
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/orders', methods=['POST'])
    def create_order():
        data = request.get_json()
        try:
            # Obtenir info del producte
            pdb = get_products_db()
            pcursor = pdb.cursor(dictionary=True)
            pcursor.execute("SELECT * FROM products WHERE id=%s", (data['product_id'],))
            product = pcursor.fetchone()
            pcursor.close()
            pdb.close()

            if not product:
                return jsonify({'error': 'Producte no trobat'}), 404

            qty = data.get('quantity', 1)
            if product['stock'] < qty:
                return jsonify({'error': 'Stock insuficient'}), 400

            total = float(product['price']) * qty

            # Descomptar stock
            pdb2 = get_products_db()
            pcursor2 = pdb2.cursor()
            pcursor2.execute("UPDATE products SET stock = stock - %s WHERE id=%s", (qty, data['product_id']))
            pdb2.commit()
            pcursor2.close()
            pdb2.close()

            # Crear comanda
            db = get_db()
            cursor = db.cursor()
            cursor.execute(
                "INSERT INTO orders (user_name, product_id, product_name, quantity, total_price, status) VALUES (%s,%s,%s,%s,%s,'confirmed')",
                (data.get('user_name', 'anonymous'), data['product_id'], product['name'], qty, total)
            )
            db.commit()
            order_id = cursor.lastrowid
            cursor.close()
            db.close()

            # Publicar a RabbitMQ
            publish_to_rabbitmq({
                'event': 'order_created',
                'order_id': order_id,
                'user': data.get('user_name', 'anonymous'),
                'product': product['name'],
                'quantity': qty,
                'total': total
            })

            return jsonify({'order_id': order_id, 'message': 'Comanda creada correctament', 'total': total}), 201
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    if __name__ == '__main__':
        init_db()
        app.run(host='0.0.0.0', port=5000)

  start.sh: |
    #!/bin/bash
    pip install flask mysql-connector-python pika --quiet
    python /app/app.py
